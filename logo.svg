<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="Chestertons">
  <defs>
    <linearGradient id="markGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="55%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="wordmarkGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Monogram mark -->
  <g transform="translate(0, 8)">
    <rect x="0" y="0" width="48" height="48" rx="11" fill="url(#markGradient)" filter="url(#glow)"/>
    <text x="24" y="34" text-anchor="middle"
          font-family="Playfair Display, Georgia, serif"
          font-size="28" font-weight="700"
          fill="#1a0d2e" letter-spacing="-0.5">C</text>
    <!-- Subtle corner notch -->
    <rect x="42" y="0" width="6" height="6" fill="rgba(0,0,0,0.18)" rx="0"/>
  </g>

  <!-- Wordmark -->
  <text x="64" y="40"
        font-family="Playfair Display, Georgia, serif"
        font-size="32" font-weight="700"
        fill="url(#wordmarkGradient)"
        letter-spacing="-0.6">Chestertons</text>
</svg>
